<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whats On Tonight | Barred In</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --img-logo: url("data:image/png;base64,[...IMAGE DATA...]");
            --img-elco: url("data:image/jpeg;base64,[...IMAGE DATA...]");
            --img-mace: url("data:image/jpeg;base64,[...IMAGE DATA...]");

            --bg: #080808; --surface: #111; --border: #222;
            --accent: #fff; --muted: #555; --text: #e8e8e8; --purple: #7b00ff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .page { display: none; min-height: 100vh; flex-direction: column; align-items: center; }

        #home { justify-content: center; }
        .logo-box { width: clamp(280px, 38vw, 480px); height: 200px; margin-bottom: 56px; background: var(--img-logo) center/contain no-repeat; }
        
        .nav-links { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .nav-links button {
            background: none; border: 1px solid var(--border); color: var(--muted);
            font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
            letter-spacing: 0.25em; text-transform: uppercase; padding: 14px 36px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .nav-links button:hover { border-color: var(--purple); color: var(--purple); }

        #talent, #contact, #upcoming { padding: 60px 40px; }
        .page-header { display: flex; align-items: center; gap: 24px; margin-bottom: 60px; width: 100%; max-width: 900px; }
        .back-btn {
            background: none; border: 1px solid var(--border); color: var(--muted);
            width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .back-btn:hover { border-color: var(--purple); color: var(--purple); }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.1em; color: var(--accent); }

        .talent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2px; max-width: 900px; width: 100%; }
        .talent-card { position: relative; aspect-ratio: 1 / 1; overflow: hidden; background: var(--surface); display: block; text-decoration: none; }
        
        .img-box { width: 100%; height: 100%; background-size: cover; background-position: center top; filter: grayscale(100%); transition: 0.4s ease; }
        .elco-img { background-image: var(--img-elco); }
        .mace-img { background-image: var(--img-mace); }

        .talent-card:hover .img-box { filter: grayscale(0%); transform: scale(1.05); }
        .talent-card-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .talent-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #fff; }

        .event-card { border: 1px solid var(--border); background: var(--surface); padding: 40px; text-align: center; max-width: 500px; width: 100%; }
        .event-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; margin-bottom: 20px; color: var(--accent); }
        .btn-ticket { 
            display: inline-block; background: var(--purple); color: #fff; 
            padding: 16px 32px; text-decoration: none; font-size: 11px; 
            font-weight: bold; letter-spacing: 0.2em; 
        }
        .btn-ticket:hover { background: #fff; color: #000; }

        .contact-block { max-width: 500px; width: 100%; border-top: 1px solid var(--border); padding-top: 20px; }
        .contact-label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.2em; }
        .contact-email { color: var(--purple); text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- PAGE: HOME -->
    <div id="home" class="page" style="display: flex;">
        <div class="logo-box"></div>
        <div class="nav-links">
            <button onclick="showPage('talent')">TALENT</button>
            <button onclick="showPage('upcoming')">UPCOMING</button>
            <button onclick="showPage('contact')">CONTACT</button>
        </div>
    </div>

    <!-- PAGE: TALENT -->
    <div id="talent" class="page">
        <div class="page-header">
            <button class="back-btn" onclick="showPage('home')">←</button>
            <div class="page-title">OUR TALENT</div>
        </div>
        <div class="talent-grid">
            <a href="#" class="talent-card">
                <div class="img-box elco-img"></div>
                <div class="talent-card-overlay"><div class="talent-name">ELCO</div></div>
            </a>
            <a href="#" class="talent-card">
                <div class="img-box mace-img"></div>
                <div class="talent-card-overlay"><div class="talent-name">MACE</div></div>
            </a>
        </div>
    </div>

    <!-- PAGE: UPCOMING -->
    <div id="upcoming" class="page">
        <div class="page-header">
            <button class="back-btn" onclick="showPage('home')">←</button>
            <div class="page-title">UPCOMING</div>
        </div>
        <div class="event-card">
            <h2>CROSSOVER CHAOS</h2>
            <p style="margin-bottom: 25px; color: var(--muted); font-size: 14px;">GET YOUR TICKETS BELOW</p>
            <a href="https://www.moshtix.co.nz/v2/event/crossover-chaos/195099" class="btn-ticket" target="_blank">GET TICKETS</a>
        </div>
    </div>

    <!-- PAGE: CONTACT -->
    <div id="contact" class="page">
        <div class="page-header">
            <button class="back-btn" onclick="showPage('home')">←</button>
            <div class="page-title">CONTACT</div>
        </div>
        <div class="contact-block">
            <span class="contact-label">Email</span>
            <a href="mailto:enquire@barredin.com" class="contact-email">enquire@barredin.com</a>
        </div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }
    </script>
</body>
</html>
